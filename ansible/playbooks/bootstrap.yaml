---
- name: Configure and bootstrap EC2 instances
  hosts: tag_ws_client
  become: true
  gather_facts: true

  tasks:

    - name: Install packaging
      ansible.builtin.dnf:
        name: python3-packaging
        state: present
    
    - name: Install extra kernel modules for container networking
      ansible.builtin.dnf:
        name: kernel-modules-extra
        state: present
      register: kernel_modules_install

    - name: Reboot if kernel modules were just installed
      ansible.builtin.reboot:
        reboot_timeout: 300
      when: kernel_modules_install.changed

    - name: Verify required kernel modules are loadable
      community.general.modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - overlay
        - br_netfilter
        - vxlan

    - name: Persist kernel modules across reboots
      ansible.builtin.copy:
        dest: /etc/modules-load.d/k3s.conf
        content: |
          overlay
          br_netfilter
          vxlan
        mode: '0644'

    - name: Set timezone
      community.general.timezone:
        name: America/New_York

    - name: Check firewalld status
      ansible.builtin.systemd:
        name: firewalld
      register: firewalld_status

    - name: Open k3s API port (6443/tcp) if firewalld is active
      ansible.posix.firewalld:
        port: 6443/tcp
        permanent: true
        immediate: true
        state: enabled
      when: firewalld_status.status.ActiveState == "active"

    - name: Open Flannel VXLAN port (8472/udp) for k3s pod networking
      ansible.posix.firewalld:
        port: 8472/udp
        permanent: true
        immediate: true
        state: enabled
      when: firewalld_status.status.ActiveState == "active"