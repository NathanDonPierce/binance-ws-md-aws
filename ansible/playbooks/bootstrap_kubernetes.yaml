---
- name: Install and start k3s
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Install container-selinux (required for k3s under SELinux enforcing)
      ansible.builtin.dnf:
        name: container-selinux
        state: present

    - name: Download k3s install script
      ansible.builtin.get_url:
        url: https://get.k3s.io
        dest: /tmp/k3s-install.sh
        mode: '0755'

    - name: Run k3s install script
      ansible.builtin.command: /tmp/k3s-install.sh
      environment:
        INSTALL_K3S_EXEC: "--write-kubeconfig-mode 644"
      args:
        creates: /usr/local/bin/k3s

    - name: Wait for k3s to be active
      ansible.builtin.systemd:
        name: k3s
        state: started
        enabled: true

    - name: Wait for node to report Ready
      ansible.builtin.command: k3s kubectl get nodes
      register: node_status
      until: "'Ready' in node_status.stdout"
      retries: 10
      delay: 30
      changed_when: false

    - name: Show node status
      ansible.builtin.debug:
        var: node_status.stdout_lines

    - name: Fetch kubeconfig to control node
      ansible.builtin.fetch:
        src: /etc/rancher/k3s/k3s.yaml
        dest: "./kubeconfig/{{ inventory_hostname }}.yaml"
        flat: true
